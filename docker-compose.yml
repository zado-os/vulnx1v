# DevXploit — official Docker Compose (ZADO-OS)
services:
  devxploit:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: zado-os/devxploit:4.2
    container_name: devxploit
    volumes:
      - ./logs:/devxploit/logs
    environment:
      - WPSCAN_API_TOKEN=${WPSCAN_API_TOKEN:-}
    entrypoint: ["python3", "devxploit.py"]
    command: ["--help"]
